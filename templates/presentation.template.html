<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  {{THEME_FONTS}}
  <style>
    /* ════════════════════════════════════════════════════════════════
       livedeck 청중 뷰 — 고정 1920×1080 스테이지 + 테마 시스템
       슬라이드는 1920×1080 캔버스에 px 좌표로 그려지고, JS 가 통째로
       scale() 한다 (frontend-slides 방식). 리플로우 없음 = 픽셀 정합.
       테마는 build_deck.py 가 {{THEME_*}} 자리에 주입한다.
       ════════════════════════════════════════════════════════════════ */

    /* 1) 베이스 토큰 — 테마가 없을 때의 기본값(Vivid). {{THEME_VARS}} 가 덮어쓴다. */
    :root {
      --canvas: #ffffff;
      --ink: #0f172a;
      --charcoal: #334155;
      --body: #475569;
      --mute: #94a3b8;
      --surface-soft: #f8fafc;
      --surface-card: #ffffff;
      --surface-dark: #0f172a;
      --hairline: #e2e8f0;
      --hairline-strong: #cbd5e1;
      --on-dark: #ffffff;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --accent-soft: #eff6ff;
      --accent-ink: #1e3a8a;
      --primary: var(--accent);
      --info: #0ea5e9;       --info-soft: #f0f9ff;
      --success: #16a34a;    --success-soft: #f0fdf4;
      --warn: #d97706;       --warn-soft: #fffbeb;
      --danger: #dc2626;     --danger-soft: #fef2f2;
      --mark-bg: #fef08a;
      /* CODE 블록 — 테마가 덮어쓸 수 있다 (기본: 어두운 코드창) */
      --code-bg: #1e1e2e;
      --code-fg: #cdd6f4;
      /* 라운드/그림자 — 테마가 brutalist면 0/하드섀도로 덮어쓴다. */
      --rounded-sm: 8px;
      --rounded-lg: 16px;
      --rounded-xl: 22px;
      --rounded-full: 9999px;
      --shadow-card: 0 1px 2px rgba(15,23,42,0.04), 0 8px 24px rgba(15,23,42,0.08);
      --card-border: 1px solid var(--hairline);
      --card-accent-edge: 5px;        /* 카드 강조 모서리 두께 */
      /* 타이포 */
      --font-display: 'Noto Sans KR', 'Inter', system-ui, sans-serif;
      --font-body: 'Noto Sans KR', 'Inter', system-ui, sans-serif;
      --font-code: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --track-display: -0.02em;       /* 큰 제목 음수 자간(덩어리감) */
      --track-h2: -0.015em;
      --eyebrow-track: 0.08em;
      --weight-display: 800;
      --weight-h2: 700;
      /* 슬라이드 패딩(1920×1080 px) */
      --pad-y: 84px;
      --pad-x: 150px;
    }
    /* 2) 테마 토큰 주입 (베이스를 덮어씀) */
    {{THEME_VARS}}

    /* tone 매핑: data-tone 으로 컴포넌트 색을 고른다.
       --tone: 보더·아이콘·바 등 면적 작은 강조 / --tone-strong: 흰 배경 위 텍스트(WCAG AA ≥4.5:1) /
       --tone-soft: 옅은 배경 / --tone-ink: 옅은 배경 위 텍스트. */
    [data-tone="accent"]  { --tone: var(--accent);  --tone-strong: var(--accent-strong); --tone-soft: var(--accent-soft);  --tone-ink: var(--accent-ink); }
    [data-tone="info"]    { --tone: var(--info);    --tone-strong: #0369a1; --tone-soft: var(--info-soft);    --tone-ink: #075985; }
    [data-tone="success"] { --tone: var(--success); --tone-strong: #15803d; --tone-soft: var(--success-soft); --tone-ink: #14532d; }
    [data-tone="warn"]    { --tone: var(--warn);    --tone-strong: #b45309; --tone-soft: var(--warn-soft);    --tone-ink: #78350f; }
    [data-tone="danger"]  { --tone: var(--danger);  --tone-strong: #b91c1c; --tone-soft: var(--danger-soft);  --tone-ink: #7f1d1d; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--stage-bg, #0b0d12); color: var(--ink);
      font-family: var(--font-body);
    }

    /* ── 고정 스테이지 ── */
    .deck-viewport { position: fixed; inset: 0; overflow: hidden; background: var(--stage-bg, #0b0d12); }
    .deck-stage {
      position: absolute; left: 0; top: 0;
      width: 1920px; height: 1080px; overflow: hidden;
      transform-origin: 0 0; background: var(--canvas);
    }

    /* ── 슬라이드(1920×1080) — 한 번에 하나만 .active ── */
    .slide {
      position: absolute; inset: 0; width: 1920px; height: 1080px; overflow: hidden;
      display: none; flex-direction: column;
      padding: var(--pad-y) var(--pad-x); background: var(--canvas);
    }
    .slide.active { display: flex; }

    .slide .eyebrow {
      font-size: 22px; font-weight: 700; letter-spacing: var(--eyebrow-track);
      color: var(--accent); text-transform: uppercase; margin-bottom: 18px;
    }
    .slide h1 {
      font-family: var(--font-display); font-weight: var(--weight-display);
      font-size: 104px; line-height: 1.04; letter-spacing: var(--track-display); color: var(--ink);
    }
    .slide h2 {
      font-family: var(--font-display); font-weight: var(--weight-h2);
      font-size: 60px; line-height: 1.12; letter-spacing: var(--track-h2); color: var(--ink);
      margin-bottom: 40px;
    }
    .slide .subtitle { font-size: 36px; color: var(--body); margin-top: 30px; max-width: 60ch; line-height: 1.4; }

    /* 인라인 강조 */
    .slide strong { font-weight: 800; color: var(--ink); }
    .slide mark { background: var(--mark-bg); color: var(--ink); padding: 0.04em 0.28em; border-radius: 0.22em; font-weight: 600; }
    .slide code {
      font-family: var(--font-code); font-size: 0.9em;
      background: var(--surface-soft); color: var(--accent-ink);
      border: 1px solid var(--hairline); border-radius: 7px; padding: 0.06em 0.4em;
    }

    /* 불릿 */
    .slide ul { list-style: none; }
    .slide li {
      position: relative; padding-left: 1.6em; margin: 22px 0;
      font-size: 32px; color: var(--charcoal); line-height: 1.45;
    }
    .slide li::before {
      content: ""; position: absolute; left: 0; top: 0.6em;
      width: 0.5em; height: 0.5em; border-radius: var(--rounded-full); background: var(--accent);
    }

    /* COVER */
    .slide[data-layout="COVER"] { justify-content: center; align-items: flex-start; }
    .slide[data-layout="COVER"] .subtitle { margin-top: 40px; }

    /* SECTION */
    .slide[data-layout="SECTION"] { justify-content: center; }
    .slide[data-layout="SECTION"] .rule { width: 134px; height: 6px; border-radius: var(--rounded-full); background: var(--accent); margin-bottom: 34px; }

    /* CONTENT */
    .slide[data-layout="CONTENT"] { justify-content: flex-start; }
    .slide[data-layout="CONTENT"] ul { flex: 1; display: flex; flex-direction: column; justify-content: center; }

    /* CLOSING (반전 면) */
    .slide[data-layout="CLOSING"] { justify-content: center; align-items: flex-start; background: var(--surface-dark); color: var(--on-dark); }
    .slide[data-layout="CLOSING"] h1 { color: var(--on-dark); }
    .slide[data-layout="CLOSING"] .subtitle { color: rgba(255,255,255,0.72); }

    /* IMAGE */
    .slide.active[data-layout="IMAGE"] {
      display: grid; justify-content: stretch; align-content: center;
      grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; column-gap: 76px; row-gap: 28px;
    }
    .slide[data-layout="IMAGE"] h2 { grid-column: 1 / -1; margin-bottom: 0; }
    .slide[data-layout="IMAGE"] ul { grid-row: 2; display: flex; flex-direction: column; justify-content: center; }
    .slide[data-layout="IMAGE"] .img-grid { grid-row: 2; }
    .slide[data-layout="IMAGE"][data-variant="right"] ul { grid-column: 1; }
    .slide[data-layout="IMAGE"][data-variant="right"] .img-grid { grid-column: 2; }
    .slide[data-layout="IMAGE"][data-variant="left"] .img-grid { grid-column: 1; }
    .slide[data-layout="IMAGE"][data-variant="left"] ul { grid-column: 2; }
    .slide[data-layout="IMAGE"][data-variant="full"] { grid-template-columns: 1fr; }
    .slide[data-layout="IMAGE"][data-variant="full"] .img-grid { grid-column: 1; grid-row: 2; }
    .img-grid { display: grid; gap: 24px 38px; align-content: center; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); min-height: 0; }
    .img-grid figure { display: flex; flex-direction: column; min-height: 0; }
    .img-grid img { width: 100%; min-height: 0; max-height: 700px; object-fit: contain; object-position: center; }
    .img-grid figcaption { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--hairline); font-size: 20px; line-height: 1.4; color: var(--body); }

    /* 컴포넌트 레이아웃 공통 */
    .slide[data-layout="STAT"], .slide[data-layout="CARDS"], .slide[data-layout="TABLE"], .slide[data-layout="COMPARE"] { justify-content: flex-start; }

    /* STAT */
    .stat-grid { flex: 1; display: grid; align-content: center; gap: 30px 38px; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); }
    .stat {
      background: var(--surface-card); border: var(--card-border);
      border-top: var(--card-accent-edge) solid var(--tone, var(--accent));
      border-radius: var(--rounded-lg); box-shadow: var(--shadow-card);
      padding: 40px 36px; display: flex; flex-direction: column; gap: 10px;
    }
    /* 수치는 흰 배경 위 텍스트이므로 --tone-strong(어두운 변종)으로 WCAG AA 대비 확보 */
    .stat-value { font-family: var(--font-display); font-weight: var(--weight-display); font-size: 88px; line-height: 1; letter-spacing: var(--track-display); color: var(--tone-strong, var(--accent-strong)); }
    .stat-label { font-size: 28px; font-weight: 600; color: var(--ink); }
    .stat-sub { font-size: 20px; color: var(--body); }

    /* CARDS */
    .card-grid { flex: 1; display: grid; align-content: center; gap: 30px 38px; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }
    .card {
      background: var(--surface-card); border: var(--card-border);
      border-radius: var(--rounded-lg); box-shadow: var(--shadow-card);
      padding: 40px 36px; display: flex; flex-direction: column; gap: 18px;
      border-left: var(--card-accent-edge) solid var(--tone, var(--accent));
    }
    .card-icon { width: 76px; height: 76px; display: flex; align-items: center; justify-content: center; font-size: 40px; border-radius: var(--rounded-sm); background: var(--tone-soft, var(--accent-soft)); color: var(--tone, var(--accent)); }
    .card-title { font-family: var(--font-display); font-weight: var(--weight-h2); font-size: 34px; color: var(--ink); line-height: 1.2; }
    .card-body { font-size: 25px; color: var(--charcoal); line-height: 1.45; }
    .card-body ul { margin: 0; }
    .card-body li { margin: 10px 0; font-size: 24px; color: var(--charcoal); }
    .card-body p { margin: 0; }

    /* TABLE — 행 수에 따라 폰트·패딩을 단계 축소해 제목 아래 영역에 항상 들어가게 한다.
       table-wrap 은 위(flex-start) 정렬이라 넘쳐도 제목을 가리지 않고, 변수로 밀도를 제어한다. */
    .table-wrap {
      flex: 1; display: flex; flex-direction: column; justify-content: flex-start; min-height: 0;
      --tbl-font: 27px; --tbl-pad-y: 22px; --tbl-pad-x: 28px; --tbl-head-pad-y: 26px;
    }
    .slide table {
      width: 100%; border-collapse: collapse; overflow: hidden;
      border-radius: var(--rounded-lg); box-shadow: var(--shadow-card); font-size: var(--tbl-font);
    }
    .slide thead th { background: var(--accent); color: var(--on-dark); font-weight: 700; text-align: left; padding: var(--tbl-head-pad-y) var(--tbl-pad-x); line-height: 1.25; }
    .slide tbody th { background: var(--accent-soft); color: var(--accent-ink); font-weight: 700; text-align: left; }
    .slide tbody td { color: var(--charcoal); }
    .slide tbody th, .slide tbody td { padding: var(--tbl-pad-y) var(--tbl-pad-x); border-top: 1px solid var(--hairline); line-height: 1.35; vertical-align: top; }
    .slide tbody tr:nth-child(even) td { background: var(--surface-soft); }
    /* 행 수 구간별 밀도 자동 조절 (build_deck.py 가 .table-wrap[data-rows] 부여) */
    .table-wrap[data-rows="7"], .table-wrap[data-rows="8"] { --tbl-font: 23px; --tbl-pad-y: 15px; --tbl-head-pad-y: 18px; }
    .table-wrap[data-rows="9"], .table-wrap[data-rows="10"] { --tbl-font: 21px; --tbl-pad-y: 11px; --tbl-pad-x: 24px; --tbl-head-pad-y: 14px; }
    .table-wrap[data-rows="11"], .table-wrap[data-rows="12"] { --tbl-font: 18px; --tbl-pad-y: 8px; --tbl-pad-x: 20px; --tbl-head-pad-y: 11px; }
    /* 13행 이상은 더 촘촘히 (그래도 넘치면 콘텐츠를 나눠야 한다 — layouts.md 안내) */
    .table-wrap[data-rows="13"], .table-wrap[data-rows="14"], .table-wrap[data-rows="15"] { --tbl-font: 16px; --tbl-pad-y: 6px; --tbl-pad-x: 18px; --tbl-head-pad-y: 9px; }

    /* CALLOUT */
    .slide[data-layout="CALLOUT"] { justify-content: center; }
    .slide[data-layout="CALLOUT"] h2 { margin-bottom: 48px; }
    .callout {
      display: flex; gap: 32px; align-items: flex-start;
      background: var(--tone-soft, var(--info-soft));
      border: 1px solid color-mix(in srgb, var(--tone, var(--info)) 30%, transparent);
      border-left: 8px solid var(--tone, var(--info));
      border-radius: var(--rounded-lg); padding: 56px 52px; box-shadow: var(--shadow-card);
    }
    .callout-icon { font-size: 56px; line-height: 1; flex-shrink: 0; }
    .callout-heading { font-family: var(--font-display); font-weight: var(--weight-h2); font-size: 40px; color: var(--tone-ink, var(--ink)); margin-bottom: 20px; line-height: 1.2; }
    .callout-text { font-size: 30px; color: var(--charcoal); line-height: 1.5; }
    .callout-text ul { margin: 0; }
    .callout-text li { margin: 14px 0; font-size: 30px; color: var(--charcoal); }
    .callout-text li::before { background: var(--tone, var(--info)); }
    .callout-text p { margin: 0; }

    /* COMPARE */
    .compare-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 46px; align-content: center; align-items: stretch; }
    .compare-col {
      background: var(--surface-card); border: var(--card-border);
      border-top: var(--card-accent-edge) solid var(--tone, var(--accent));
      border-radius: var(--rounded-lg); box-shadow: var(--shadow-card); padding: 44px 40px;
    }
    .compare-heading { font-family: var(--font-display); font-weight: var(--weight-h2); font-size: 36px; color: var(--tone, var(--accent)); margin-bottom: 28px; padding-bottom: 18px; border-bottom: 2px solid var(--hairline); }
    .compare-col ul { margin: 0; }
    .compare-col li { font-size: 28px; color: var(--charcoal); margin: 18px 0; }
    .compare-col li::before { background: var(--tone, var(--accent)); }

    /* footer (스테이지 하단에 고정 — 스케일 함께) */
    .deck-footer {
      position: absolute; left: 0; right: 0; bottom: 0; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--pad-x); font-size: 20px; line-height: 1; color: var(--body);
      border-top: 1px solid var(--hairline); background: var(--canvas);
    }
    /* left(카피라이트)가 길어도 center(페이지번호)를 침범하지 않도록 너비를 캡하고,
       넘치면 말줄임 처리한다. center 는 화면 정중앙 고정, right 는 로고 영역. */
    .deck-footer .left { min-width: 0; max-width: calc(50% - 90px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .deck-footer .center { position: absolute; left: 50%; transform: translateX(-50%); white-space: nowrap; }
    .deck-footer .right { flex: 0 0 auto; }
    .deck-footer img { max-height: 36px; width: auto; }
    /* COVER/CLOSING 에서는 footer 숨김 */
    .slide[data-layout="COVER"].active ~ .deck-footer,
    .slide[data-layout="CLOSING"].active ~ .deck-footer { display: none; }

    /* 진행 바 (스테이지 하단) */
    .progress-track { position: absolute; left: 0; right: 0; bottom: 0; height: 5px; background: transparent; z-index: 70; }
    .progress-bar { height: 100%; width: 0; background: var(--accent); transition: width 0.25s ease; }

    /* 펜·스포트라이트 (스테이지 내부, 1920×1080 버퍼) */
    .annot-overlay { position: absolute; inset: 0; width: 1920px; height: 1080px; pointer-events: none; }
    #penCanvas { z-index: 80; }
    #spotCanvas { z-index: 81; }

    /* ── 진입 애니메이션: 활성 슬라이드의 요소가 순차 등장 ── */
    @keyframes revealUp { from { opacity: 0; transform: translateY(34px); } to { opacity: 1; transform: translateY(0); } }
    .slide.active > h1, .slide.active > h2, .slide.active > .eyebrow, .slide.active > .rule, .slide.active > .subtitle,
    .slide.active li, .slide.active .stat, .slide.active .card, .slide.active .callout,
    .slide.active .compare-col, .slide.active tbody tr, .slide.active .img-grid figure,
    .slide.active .tl-step, .slide.active .code-block {
      opacity: 0; animation: revealUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .slide.active > .eyebrow { animation-delay: 0.02s; }
    .slide.active > h1, .slide.active > h2 { animation-delay: 0.06s; }
    .slide.active > .subtitle { animation-delay: 0.16s; }
    /* 그리드/리스트 항목 스태거 */
    .slide.active li:nth-child(1), .slide.active .stat:nth-child(1), .slide.active .card:nth-child(1), .slide.active .compare-col:nth-child(1), .slide.active tbody tr:nth-child(1), .slide.active .img-grid figure:nth-child(1) { animation-delay: 0.14s; }
    .slide.active li:nth-child(2), .slide.active .stat:nth-child(2), .slide.active .card:nth-child(2), .slide.active .compare-col:nth-child(2), .slide.active tbody tr:nth-child(2), .slide.active .img-grid figure:nth-child(2) { animation-delay: 0.22s; }
    .slide.active li:nth-child(3), .slide.active .stat:nth-child(3), .slide.active .card:nth-child(3), .slide.active tbody tr:nth-child(3), .slide.active .img-grid figure:nth-child(3) { animation-delay: 0.30s; }
    .slide.active li:nth-child(4), .slide.active .stat:nth-child(4), .slide.active .card:nth-child(4), .slide.active tbody tr:nth-child(4) { animation-delay: 0.38s; }
    .slide.active li:nth-child(5), .slide.active .stat:nth-child(5), .slide.active .card:nth-child(5), .slide.active tbody tr:nth-child(5) { animation-delay: 0.46s; }
    .slide.active li:nth-child(n+6), .slide.active .stat:nth-child(n+6), .slide.active .card:nth-child(n+6), .slide.active tbody tr:nth-child(n+6), .slide.active .img-grid figure:nth-child(n+4) { animation-delay: 0.54s; }
    .slide.active .callout { animation-delay: 0.16s; }
    .slide.active .tl-step:nth-child(1) { animation-delay: 0.14s; }
    .slide.active .tl-step:nth-child(2) { animation-delay: 0.24s; }
    .slide.active .tl-step:nth-child(3) { animation-delay: 0.34s; }
    .slide.active .tl-step:nth-child(4) { animation-delay: 0.44s; }
    .slide.active .tl-step:nth-child(n+5) { animation-delay: 0.54s; }
    .slide.active .code-block { animation-delay: 0.14s; }

    /* ── TIMELINE: 가로 단계, 번호 노드 + 연결선 + 세로 카드 ── */
    .slide[data-layout="TIMELINE"] { justify-content: flex-start; }
    .timeline {
      flex: 1; display: flex; align-items: stretch; justify-content: space-between;
      gap: 30px; align-content: center;
    }
    .tl-step { flex: 1; position: relative; display: flex; flex-direction: column; align-items: stretch; padding-top: 70px; }
    /* 연결선: 노드 중심 높이(35px)에 가로선 */
    .tl-step::before {
      content: ""; position: absolute; top: 34px; left: 50%; right: calc(-1 * (30px + 50%) + 50%);
      width: calc(100% + 30px); height: 3px; background: var(--hairline); z-index: 0;
    }
    .tl-step:last-child::before { display: none; }
    .tl-node {
      position: absolute; top: 0; left: 0; width: 68px; height: 68px; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      background: var(--tone, var(--accent)); color: #fff;
      font-family: var(--font-display); font-weight: 800; font-size: 30px;
      border-radius: var(--rounded-full); box-shadow: var(--shadow-card);
    }
    .tl-card {
      flex: 1; background: var(--surface-card); border: var(--card-border);
      border-left: var(--card-accent-edge) solid var(--tone, var(--accent));
      border-radius: var(--rounded-lg); box-shadow: var(--shadow-card); padding: 28px 26px;
    }
    .tl-label { font-size: 19px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--tone, var(--accent)); margin-bottom: 10px; }
    .tl-title { font-family: var(--font-display); font-weight: 700; font-size: 28px; color: var(--ink); line-height: 1.2; margin-bottom: 12px; }
    .tl-body { font-size: 22px; color: var(--charcoal); line-height: 1.45; }
    .tl-card ul { margin: 0; }
    .tl-card li { font-size: 22px; color: var(--charcoal); margin: 10px 0; }
    .tl-card li::before { background: var(--tone, var(--accent)); }

    /* ── CODE: 어두운 코드 블록 ── */
    .slide[data-layout="CODE"] { justify-content: flex-start; }
    .code-intro { font-size: 28px; color: var(--body); margin-bottom: 28px; line-height: 1.4; }
    .code-block {
      flex: 1; min-height: 0; background: var(--code-bg); border-radius: var(--rounded-lg);
      box-shadow: var(--shadow-card); padding: 40px 44px; overflow: hidden;
      display: flex; flex-direction: column; justify-content: center;
    }
    .code-block pre { margin: 0; display: flex; flex-direction: column; gap: 4px; }
    .code-line {
      font-family: var(--font-code); font-size: 28px; line-height: 1.5;
      color: var(--code-fg); white-space: pre; tab-size: 2;
    }

    /* 3) 테마 시그니처 장식 CSS 주입 */
    {{THEME_CSS}}

    .print-pageno { display: none; }

    @media (prefers-reduced-motion: reduce) {
      .slide.active > *, .slide.active li, .slide.active .stat, .slide.active .card,
      .slide.active .callout, .slide.active .compare-col, .slide.active tbody tr, .slide.active .img-grid figure,
      .slide.active .tl-step, .slide.active .code-block {
        animation: none !important; opacity: 1 !important;
      }
    }

    /* ── PDF export: 1슬라이드 = 1페이지(1920×1080) ── */
    @media print {
      @page { size: 1920px 1080px; margin: 0; }
      html, body { width: 1920px; height: auto; overflow: visible; background: #fff; }
      .deck-viewport { position: static; overflow: visible; background: #fff; }
      .deck-stage { position: static; width: auto; height: auto; transform: none !important; background: none; }
      .slide {
        position: relative; inset: auto; display: flex !important;
        width: 1920px; height: 1080px; overflow: hidden;
        break-after: page; page-break-after: always;
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
      }
      .slide:last-child { break-after: auto; page-break-after: auto; }
      .slide[data-layout="IMAGE"] { display: grid !important; }
      .slide.active > *, .slide.active li, .slide.active .stat, .slide.active .card,
      .slide.active .callout, .slide.active .compare-col, .slide.active tbody tr, .slide.active .img-grid figure,
      .slide.active .tl-step, .slide.active .code-block {
        animation: none !important; opacity: 1 !important;
      }
      .progress-track, .annot-overlay, #penCanvas, #spotCanvas, .deck-footer { display: none !important; }
      .print-pageno { display: block; position: absolute; right: var(--pad-x); bottom: 40px; font-size: 20px; color: var(--body); }
      .slide[data-layout="CLOSING"] .print-pageno { color: rgba(255,255,255,0.7); }
    }
  </style>
</head>
<body>
  <div class="deck-viewport">
    <div class="deck-stage" id="stage" data-theme="{{THEME}}">
      {{SLIDES}}

      {{FOOTER}}

      <canvas class="annot-overlay" id="penCanvas" width="1920" height="1080"></canvas>
      <canvas class="annot-overlay" id="spotCanvas" width="1920" height="1080"></canvas>

      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    </div>
  </div>

  <script>
    /* ── 고정 스테이지 스케일러: 1920×1080 을 뷰포트에 맞춰 통째 축소(레터박스) ── */
    var stage = document.getElementById('stage');
    function fitStage() {
      var vw = window.innerWidth, vh = window.innerHeight;
      var s = Math.min(vw / 1920, vh / 1080);
      var x = (vw - 1920 * s) / 2, y = (vh - 1080 * s) / 2;
      stage.style.transform = 'translate(' + x + 'px,' + y + 'px) scale(' + s + ')';
    }
    window.addEventListener('resize', fitStage);
    fitStage();

    /* livedeck 동기화 계약. 청중 뷰 = 수신 전용. */
    var CHANNEL = 'livedeck-sync';
    var TOTAL_SLIDES = {{TOTAL_SLIDES}};
    var channel = new BroadcastChannel(CHANNEL);
    function syncSend(msg) { channel.postMessage(msg); }
    function syncOnMessage(handler) { channel.onmessage = function (e) { handler(e.data); }; }

    function clampSlide(n) { n = parseInt(n, 10) || 1; return Math.min(Math.max(1, n), TOTAL_SLIDES); }

    function goToSlide(n, persist) {
      n = clampSlide(n);
      var slides = document.querySelectorAll('.slide');
      for (var i = 0; i < slides.length; i++) {
        var sl = slides[i];
        var on = parseInt(sl.getAttribute('data-slide'), 10) === n;
        /* 애니메이션 재생을 위해 active 토글 시 리플로우 강제 */
        if (on && !sl.classList.contains('active')) {
          sl.classList.add('active'); void sl.offsetWidth;
        } else if (!on) {
          sl.classList.remove('active');
        }
      }
      var bar = document.getElementById('progressBar');
      if (bar) bar.style.width = (n / TOTAL_SLIDES * 100) + '%';
      var pageEl = document.querySelector('.deck-footer .page');
      if (pageEl) pageEl.textContent = n + ' / ' + TOTAL_SLIDES;
      if (persist) {
        if (location.hash !== '#' + n) history.replaceState(null, '', '#' + n);
        try { localStorage.setItem('livedeck-current', String(n)); } catch (e) {}
      }
    }

    function initialSlide() {
      var fromHash = parseInt(location.hash.replace('#', ''), 10);
      if (fromHash) return clampSlide(fromHash);
      var stored = null;
      try { stored = parseInt(localStorage.getItem('livedeck-current'), 10); } catch (e) {}
      return clampSlide(stored || 1);
    }

    /* ── 펜·스포트라이트 (수신 렌더 전용). 버퍼는 1920×1080 고정 = 스테이지 좌표계. ── */
    var annot = (function () {
      var penCanvas = document.getElementById('penCanvas');
      var spotCanvas = document.getElementById('spotCanvas');
      var penCtx = penCanvas.getContext('2d');
      var spotCtx = spotCanvas.getContext('2d');
      function drawSegment(points, color) {
        if (!points || points.length < 1) return;
        penCtx.strokeStyle = color || '#e00'; penCtx.lineWidth = 4;
        penCtx.lineJoin = 'round'; penCtx.lineCap = 'round';
        penCtx.beginPath();
        for (var i = 0; i < points.length; i++) {
          var px = points[i][0] * 1920, py = points[i][1] * 1080;
          if (i === 0) penCtx.moveTo(px, py); else penCtx.lineTo(px, py);
        }
        penCtx.stroke();
      }
      function drawSpot(x, y) {
        spotCtx.clearRect(0, 0, 1920, 1080); spotCtx.save();
        spotCtx.fillStyle = 'rgba(0,0,0,0.55)'; spotCtx.fillRect(0, 0, 1920, 1080);
        spotCtx.globalCompositeOperation = 'destination-out';
        spotCtx.beginPath(); spotCtx.arc(x * 1920, y * 1080, 0.12 * 1920, 0, Math.PI * 2); spotCtx.fill();
        spotCtx.restore();
      }
      function clearSpot() { spotCtx.clearRect(0, 0, 1920, 1080); }
      function clearPen() { penCtx.clearRect(0, 0, 1920, 1080); }
      function clearAll() { clearPen(); clearSpot(); }
      return { drawSegment: drawSegment, drawSpot: drawSpot, clearSpot: clearSpot, clearAll: clearAll };
    })();

    syncOnMessage(function (data) {
      if (!data) return;
      if (data.type === 'slideChange') { annot.clearAll(); goToSlide(data.slide, true); }
      else if (data.type === 'draw' && data.mode === 'pen') { annot.drawSegment(data.points, data.color); }
      else if (data.type === 'spotlight') { if (data.on) annot.drawSpot(data.x, data.y); else annot.clearSpot(); }
      else if (data.type === 'clear') { annot.clearAll(); }
    });

    function toggleFullscreen() {
      if (!document.fullscreenElement) { (document.documentElement.requestFullscreen || function () {}).call(document.documentElement); }
      else if (document.exitFullscreen) { document.exitFullscreen(); }
    }
    document.addEventListener('dblclick', function () { toggleFullscreen(); });

    document.addEventListener('keydown', function (e) {
      var cur = clampSlide((location.hash.replace('#', '')) || 1);
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goToSlide(cur + 1, true); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); goToSlide(cur - 1, true); }
      else if (e.key === 'Home') { e.preventDefault(); goToSlide(1, true); }
      else if (e.key === 'End') { e.preventDefault(); goToSlide(TOTAL_SLIDES, true); }
      else if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFullscreen(); }
    });

    goToSlide(initialSlide(), true);

    /* PDF 인쇄 직전 각 슬라이드에 페이지 번호 주입 */
    function addPrintPageNumbers() {
      removePrintPageNumbers();
      var slides = document.querySelectorAll('.slide');
      for (var i = 0; i < slides.length; i++) {
        var n = parseInt(slides[i].getAttribute('data-slide'), 10);
        var tag = document.createElement('div');
        tag.className = 'print-pageno'; tag.textContent = n + ' / ' + TOTAL_SLIDES;
        slides[i].appendChild(tag);
      }
    }
    function removePrintPageNumbers() {
      var tags = document.querySelectorAll('.print-pageno');
      for (var i = 0; i < tags.length; i++) tags[i].parentNode.removeChild(tags[i]);
    }
    window.addEventListener('beforeprint', addPrintPageNumbers);
    window.addEventListener('afterprint', removePrintPageNumbers);

    syncSend({ type: 'requestSync' });
  </script>
</body>
</html>
